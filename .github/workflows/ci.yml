name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  db-and-permission-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          # Pinned, not "latest": Supabase CLI v2's local dev bootstrap no
          # longer auto-grants baseline USAGE/SELECT on the public schema
          # to anon/authenticated. This repo's migrations rely on that
          # grant existing (same as local dev, which already pins
          # "supabase": "^1.190.0" in package.json) — none of them issue
          # an explicit GRANT. "latest" silently drifted from v1.x to
          # v2.109.1 and broke every anon/authenticated query in CI with
          # "permission denied for table X" (Postgres error 42501), while
          # local dev, lint, typecheck, and the deployed app itself were
          # all unaffected. Confirmed by bootstrapping isolated instances
          # with both versions against this repo's exact migrations +
          # seed: v1.226.4 grants access correctly; v2.109.1 does not.
          version: 1.226.4
      - name: Start local Supabase
        run: supabase start
      - name: Apply migrations + seed
        run: supabase db reset
      - name: Run permission and core data flow tests
        run: npm run test --workspace=apps/consumer-web-app
        env:
          # Fixed local-only demo keys `supabase start` always prints for the
          # CLI's default local JWT secret — not secrets, never valid against
          # a real project, safe to commit. See supabase/config.toml.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      - name: Stop Supabase
        if: always()
        run: supabase stop
